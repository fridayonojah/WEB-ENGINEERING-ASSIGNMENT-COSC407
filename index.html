<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="registration-card">
    <div class="logo-container">
        <img src="logo.png" alt="Brand Logo">
    </div>

    <h2>Create Account</h2>
    
    <form action="submit-registration.php" method="POST">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="18" max="120">
        </div>

        <div class="form-group">
            <label for="country">Country</label>
            <select id="country" name="country">
                <option value="USA">United States</option>
                <option value="CAN">Canada</option>
                <option value="GBR">United Kingdom</option>
                <option value="AUS">Australia</option>
                <option value="DEU">Germany</option>
            </select>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
                <label><input type="radio" name="gender" value="Other"> Other</label>
            </div>
        </div>

        <div class="form-group">
            <label>Interests</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="interests[]" value="Tech"> Tech</label>
                <label><input type="checkbox" name="interests[]" value="Art"> Art</label>
                <label><input type="checkbox" name="interests[]" value="Music"> Music</label>
            </div>
        </div>

        <div class="form-group full-width">
            <label for="bio">Short Bio</label>
            <textarea id="bio" name="bio" maxlength="500"></textarea>
        </div>

        <div class="button-group">
            <button type="submit">Submit Registration</button>
            <button type="reset">Reset</button>
        </div>
    </form>
</div>

</body>
</html>
